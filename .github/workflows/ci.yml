name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Runs ESLint + the shader smoke test (scripts/smoke-shaders.mjs)
      - name: Lint + shader smoke test
        run: npm run lint

      - name: Production build
        run: npm run build
